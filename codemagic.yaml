workflows:
  android-release:
    name: Android Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --target-platform android-arm64
    artifacts:
      - build/**/outputs/**/*.apk

  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates || true
          xcode-project use-profiles || true
      - name: Build signed IPA
        script: |
          # Try signed build first
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist 2>/dev/null || {
            echo "Signed build failed, trying manual signing..."
            flutter build ios --release --no-codesign
            
            # Manual sign with codesign
            IDENTITY=$(security find-identity -v -p codesigning | head -1 | grep -o '"[^"]*"' | tr -d '"')
            if [ -n "$IDENTITY" ]; then
              echo "Signing with: $IDENTITY"
              codesign --force --sign "$IDENTITY" --entitlements ios/Runner/Runner.entitlements build/ios/iphoneos/Runner.app || true
            fi
            
            # Package IPA
            cd build/ios/iphoneos
            mkdir -p Payload
            cp -r Runner.app Payload/
            zip -r $CM_BUILD_DIR/moonlight-memo.ipa Payload
          }
    artifacts:
      - build/ios/ipa/*.ipa
      - "*.ipa"
