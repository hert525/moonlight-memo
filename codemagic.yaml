workflows:
  android-release:
    name: Android Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --target-platform android-arm64
    artifacts:
      - build/**/outputs/**/*.apk

  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Set up code signing
        script: |
          keychain initialize

          # Find and add the uploaded certificate
          CERT_PATH=$(find $HOME/Library/MobileDevice -name "*.p12" 2>/dev/null | head -1)
          if [ -z "$CERT_PATH" ]; then
            echo "Looking for certificate in CM environment..."
            # Codemagic stores uploaded certs as environment refs
            # Use the keychain add-certificates which reads from CM's cert store
            keychain add-certificates || true
          else
            echo "Found cert: $CERT_PATH"
            keychain add-certificates
          fi

          # Find and install provisioning profile
          PROFILE_PATH=$(find $HOME/Library/MobileDevice -name "*.mobileprovision" 2>/dev/null | head -1)
          if [ -n "$PROFILE_PATH" ]; then
            echo "Found profile: $PROFILE_PATH"
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
            cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/
          fi

          xcode-project use-profiles || true
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r $CM_BUILD_DIR/moonlight-memo.ipa Payload
    artifacts:
      - "*.ipa"
      - build/ios/iphoneos/Runner.app
